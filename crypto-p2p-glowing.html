<title>P2P Flow — USDT › WinPay</title>

<style>
  :root {
    --bg: #000000;
    --surface: #0a0a0a;
    --surface2: #111111;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.1);
    --chrome: #c8c8d4;
    --chrome-bright: #ffffff;
    --chrome-dim: rgba(200,200,212,0.5);
    --holo-1: #a8d8f0;
    --holo-2: #e8c4f0;
    --holo-3: #b8f0d8;
    --holo-4: #f0e8a8;
    --accent: #ffffff;
    --amber: #ff6b2b;
    --text: #e8e8ec;
    --text-muted: rgba(232,232,236,0.45);
    --text-dim: rgba(232,232,236,0.2);
    --mono: 'Space Mono', monospace;
    --sans: 'Inter', sans-serif;
    --serif: 'Lora', serif;
    --glow-chrome: 0 0 30px rgba(200,200,212,0.15), 0 0 60px rgba(200,200,212,0.05);
    --glow-holo: 0 0 20px rgba(168,216,240,0.2);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 16px 80px;
    position: relative;
    overflow-x: hidden;
  }

  /* Ambient background glow */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 500px;
    background: radial-gradient(ellipse,
      rgba(168,216,240,0.04) 0%,
      rgba(232,196,240,0.03) 30%,
      rgba(184,240,216,0.02) 60%,
      transparent 80%
    );
    pointer-events: none;
    z-index: 0;
  }

  /* Grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  }

  @keyframes floatButterfly {
    0%,100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-10px) scale(1.03); }
  }

  .wrapper {
    width: 100%;
    max-width: 460px;
    position: relative;
    z-index: 1;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 44px;
    animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 100px;
    padding: 5px 14px 5px 10px;
    margin-bottom: 24px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--chrome-dim);
    text-transform: uppercase;
    backdrop-filter: blur(10px);
  }

  .logo-dot {
    width: 5px; height: 5px;
    background: var(--chrome-bright);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(255,255,255,0.8);
    animation: pulse 2.5s ease infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); box-shadow: 0 0 8px rgba(255,255,255,0.8); }
    50% { opacity:0.4; transform:scale(0.6); box-shadow: 0 0 4px rgba(255,255,255,0.3); }
  }

  h1 {
    font-family: var(--sans);
    font-size: 34px;
    font-weight: 700;
    letter-spacing: 0.06em;
    line-height: 1.15;
    text-transform: uppercase;
    background: linear-gradient(135deg,
      #ffffff 0%,
      var(--holo-1) 25%,
      var(--holo-2) 50%,
      var(--holo-3) 75%,
      #ffffff 100%
    );
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: holoShift 6s ease infinite;
  }

  @keyframes holoShift {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .subtitle {
    margin-top: 10px;
    font-size: 13px;
    color: var(--text-muted);
    font-family: var(--serif);
    font-style: italic;
    letter-spacing: 0.04em;
  }

  /* ── CARD ── */
  .card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    margin-bottom: 12px;
    backdrop-filter: blur(20px);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 4px 24px rgba(0,0,0,0.35);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 40px rgba(168,216,240,0.06);
  }

  /* Content area stretches to fill — pushes footer down */
  .card-content {
    padding: 28px 24px 16px;
    flex-grow: 1;
  }

  /* Footer: no top padding to avoid double gap with content */
  .card-footer {
    padding: 0 24px 24px;
  }

  /* Chrome highlight edge on card */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    background: linear-gradient(135deg,
      rgba(255,255,255,0.08) 0%,
      transparent 50%,
      rgba(255,255,255,0.02) 100%
    );
    pointer-events: none;
  }

  /* CD watermark inside card */
  .card::after {
    content: '';
    position: absolute;
    bottom: -40px;
    right: -40px;

</style>
</head>
<body>

<div class="deco-cube"></div>
<div class="deco-butterfly"></div>

<div class="wrapper">

  <div class="header">
    <div class="logo-badge">
      <div class="logo-dot"></div>
      P2P Flow
    </div>
    <h1>USDT › WinPay</h1>
    <p class="subtitle">Binance BSC withdrawal calculator</p>
  </div>

  <!-- Input Card -->
  <div class="glass-card-wrapper">
  <div class="card" id="inputCard">

    <div class="card-content">

      <div class="input-field" id="field1">
        <div class="field-label">Step 01</div>
        <div class="field-q">How much USDT do you have in Binance?</div>
        <div class="input-row">
          <div class="input-wrap">
            <input type="number" id="usdtInput" placeholder="0.00" step="0.0001" min="0" />
            <span class="input-unit">USDT</span>
          </div>
          <button class="btn-next" id="nextBtn1" onclick="confirmField1()">→</button>
        </div>
      </div>

      <div class="divider" id="div1"></div>

      <div id="field1Confirmed" style="display:none">
        <div class="field-confirmed">
          <span class="conf-label">USDT Balance</span>
          <span class="conf-value">
            <span class="check-icon">✓</span>
            <span id="conf1Val">—</span>
            <span class="unit">USDT</span>
          </span>
        </div>
      </div>

      <div class="input-field" id="field2">
        <div class="field-label">Step 02</div>
        <div class="field-q">What is WinPay's buying rate? <span style="color:var(--text-muted);font-size:12px;">(RP per 1 USDT)</span></div>
        <div class="input-row">
          <div class="input-wrap">
            <input type="number" id="rateInput" placeholder="106" step="0.01" min="0" />
            <span class="input-unit">RP/USDT</span>
          </div>
          <button class="btn-next" id="nextBtn2" onclick="confirmField2()">→</button>
        </div>
      </div>

      <div class="divider" id="div2"></div>

      <div id="field2Confirmed" style="display:none">
        <div class="field-confirmed">
          <span class="conf-label">WinPay Rate</span>
          <span class="conf-value">
            <span class="check-icon">✓</span>
            <span id="conf2Val">—</span>
            <span class="unit">RP/USDT</span>
          </span>
        </div>
      </div>

    </div><!-- /.card-content -->

    <div class="card-footer">
      <button class="btn-calc" id="calcBtn" onclick="calculate()">
        <span>Calculate</span>
        <span>→</span>
      </button>
    </div><!-- /.card-footer -->

  </div><!-- /.glass-card-wrapper -->

  <div id="results"></div>

</div>

<script>
  let usdt = 0, rate = 0;
  let vals = {};
  let stepCount = 0;

  window.onload = () => { showField('field1'); };

  function showField(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add('visible');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => el.classList.add('shown'));
    });
  }

  function confirmField1() {
    const v = parseFloat(document.getElementById('usdtInput').value);
    if (!v || v <= 0) { shake('usdtInput'); return; }
    usdt = v;
    const f1el = document.getElementById('field1'); f1el.classList.remove('shown','visible'); f1el.style.removeProperty('display');
    document.getElementById('conf1Val').textContent = usdt.toFixed(4);
    document.getElementById('field1Confirmed').style.display = 'block';
    document.getElementById('div1').classList.add('shown');
    setTimeout(() => showField('field2'), 200);
    setTimeout(() => { document.getElementById('rateInput').focus(); }, 600);
  }

  function confirmField2() {
    const v = parseFloat(document.getElementById('rateInput').value);
    if (!v || v <= 0) { shake('rateInput'); return; }
    rate = v;
    const f2el = document.getElementById('field2'); f2el.classList.remove('shown','visible'); f2el.style.removeProperty('display');
    document.getElementById('conf2Val').textContent = rate.toFixed(2);
    document.getElementById('field2Confirmed').style.display = 'block';
    document.getElementById('div2').classList.add('shown');
    setTimeout(() => { document.getElementById('calcBtn').classList.add('shown'); }, 300);
  }

  function copyAmount(amount, btn) {
    navigator.clipboard.writeText(String(amount)).then(() => {
      btn.textContent = 'Copied ✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    }).catch(() => {
      // fallback: select text
      const el = btn.closest('.amount-hero').querySelector('.amount-hero-val');
      const range = document.createRange();
      range.selectNode(el);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
    });
  }

  async function pasteWallet() {
    const btn = document.getElementById('walletPasteBtn');
    const inp = document.getElementById('walletAddressInput');
    try {
      const text = await navigator.clipboard.readText();
      inp.value = text;
      btn.textContent = 'Copied ✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Paste'; btn.classList.remove('copied'); }, 2000);
    } catch(e) {
      inp.focus();
    }
  }

  function shake(id) {
    const el = document.getElementById(id);
    el.style.borderColor = 'rgba(255,107,43,0.6)';
    el.style.boxShadow = '0 0 0 3px rgba(255,107,43,0.12)';
    setTimeout(() => { el.style.borderColor = ''; el.style.boxShadow = ''; }, 700);
  }

  function calculate() {
    // Step 1: WinPay top-up amount (floor = whole number WinPay shows as recharge amount)
    vals.topUpINR = Math.floor(usdt * rate);

    // Step 2: WinPay's "Estimate" — how much USDT they expect to receive
    // WinPay floors to 4 decimal places: floor(topUp / rate * 10000) / 10000
    vals.winpayExpect = Math.floor((vals.topUpINR / rate) * 10000) / 10000;

    // Step 3: You type THIS in Binance withdraw amount field
    // After Binance deducts 0.01 fee, WinPay receives exactly winpayExpect
    vals.withdrawAmt = parseFloat((vals.winpayExpect + 0.01).toFixed(4));

    // Step 4: What WinPay receives = winpayExpect (they match)
    vals.receivedAmt = vals.winpayExpect;

    document.getElementById('calcBtn').style.display = 'none';
    document.getElementById('results').innerHTML = '';
    stepCount = 0;
    revealStep(0);
  }

  const stepsData = [
    {
      num: '01',
      title: 'WinPay Top-Up',
      render: () => `
        <div class="step-line"><span class="line-inner">Open WinPay and go to the <strong style="color:var(--text)">Top-Up</strong> section.</span></div>
        <div class="step-line"><span class="line-inner">Type this amount in the WinPay top-up field:</span></div>
        <div class="amount-hero">
          <div class="amount-hero-label">Enter in WinPay</div>
          <div class="amount-hero-val">${vals.topUpINR.toLocaleString()}</div>
          <div class="amount-hero-unit">RP</div>
          <button class="amount-copy-btn" onclick="copyAmount('${vals.topUpINR}', this)">Copy</button>
        </div>
        <div class="step-line"><span class="line-inner">WinPay will show a <strong style="color:var(--text)">QR code</strong> + payment amount — <strong style="color:var(--text)">screenshot that screen.</strong></span></div>
        <div class="ss-hint">
          <div class="ss-icon">📸</div>
          <div class="ss-text">
            <div class="ss-title">Screenshot this screen in WinPay</div>
            <div class="ss-sub">The QR code + <span style="color:#a8d8f0;font-family:var(--mono)">${vals.topUpINR.toLocaleString()} RP</span> must be clearly visible. Keep it for records.</div>
          </div>
        </div>
      `
    },
    {
      num: '02',
      title: 'Binance Withdrawal',
      render: () => `
        <div class="step-line"><span class="line-inner">Go to <strong style="color:var(--text)">Binance → Wallet → Withdraw</strong>, select <span class="val">USDT</span>, network <span class="val val-amber">BSC (BEP-20)</span>.</span></div>
        <div class="step-line"><span class="line-inner">In the <strong style="color:var(--text)">amount field</strong>, manually type exactly:</span></div>
        <div class="amount-hero">
          <div class="amount-hero-label">Type this in Binance</div>
          <div class="amount-hero-val">${vals.withdrawAmt}</div>
          <div class="amount-hero-unit">USDT</div>
          <button class="amount-copy-btn" onclick="copyAmount('${vals.withdrawAmt}', this)">Copy</button>
        </div>
        <div class="step-line"><span class="line-inner">After the <span class="val">0.01 USDT</span> network fee, WinPay will receive exactly <span class="val">${vals.receivedAmt} USDT</span> — matching their payment amount.</span></div>
        <div class="warn-block">
          <div class="warn-icon">⚠️</div>
          <div class="warn-text">Always double-check that <strong>BSC (BEP-20)</strong> is selected. Wrong network = permanent loss of funds.</div>
        </div>
      `
    },
    {
      num: '03',
      title: 'Verify Before Confirming',
      render: () => `
        <div class="step-line"><span class="line-inner">On the Binance withdrawal confirmation screen, verify these two values:</span></div>
        <div class="verify-grid">
          <div class="verify-cell">
            <div class="verify-cell-label">You Type in Binance</div>
            <div class="verify-cell-val">${vals.withdrawAmt} <span class="unit-sm">USDT</span></div>
          </div>
          <div class="verify-cell">
            <div class="verify-cell-label">WinPay Receives</div>
            <div class="verify-cell-val">${vals.receivedAmt} <span class="unit-sm">USDT</span></div>
          </div>
        </div>
        <div class="match-badge">✅ WinPay payment amount <strong style="margin-left:4px">${vals.winpayExpect} USDT</strong> must match "they receive"</div>
      `
    },
    {
      num: '04',
      title: 'Submit & Wait',
      render: () => `
        <div class="step-line"><span class="line-inner">Once Binance confirms the withdrawal, go back to WinPay.</span></div>
        <div class="step-line"><span class="line-inner">Wait for WinPay to detect the incoming USDT and confirm your top-up. You're done! 🎉</span></div>
      `
    }
  ];

  function revealStep(index) {
    if (index >= stepsData.length) { revealFinal(); return; }
    const s = stepsData[index];
    const wrapper = document.createElement('div');
    wrapper.className = 'glass-card-wrapper';
    const card = document.createElement('div');
    card.className = 'step-card';
    card.id = `step-card-${index}`;
    card.innerHTML = `
      <div class="step-header">
        <div class="step-num">${s.num}</div>
        <div class="step-title">${s.title}</div>
      </div>
      <div class="step-body">
        ${s.render()}
      </div>
      <div class="step-footer">
        <button class="btn-gotit" id="gotit-${index}" onclick="gotIt(${index})">Got it ✓</button>
      </div>
    `;
    wrapper.appendChild(card);
    document.getElementById('results').appendChild(wrapper);

    // Trigger stretch-open animation
    setTimeout(() => {
      card.classList.add('shown');
      wrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });

      // After card is open, typewrite each .line-inner sequentially
      const lines = card.querySelectorAll('.line-inner');
      lines.forEach((line, i) => {
        const fullHTML = line.innerHTML;
        const plainText = line.textContent;
        line.textContent = '';
        line.style.opacity = '1';

        const delay = 480 + i * 260; // stagger each line
        setTimeout(() => {
          typewriteLine(line, fullHTML, plainText, 0, 22);
        }, delay);
      });
    }, 80);
  }

  function typewriteLine(el, fullHTML, plainText, charIndex, speed) {
    if (charIndex > plainText.length) return;
    // For simplicity, reveal by character count but preserve inner HTML
    // We replace text content progressively until done, then restore full HTML
    if (charIndex === plainText.length) {
      el.innerHTML = fullHTML; // restore with bold/spans intact
      return;
    }
    el.textContent = plainText.substring(0, charIndex);
    setTimeout(() => typewriteLine(el, fullHTML, plainText, charIndex + 1, speed), speed);
  }

  function gotIt(index) {
    const btn = document.getElementById(`gotit-${index}`);
    btn.classList.add('done');
    btn.textContent = '✓ Done';
    setTimeout(() => { revealStep(index + 1); }, 350);
  }

  function revealFinal() {
    const wrapper = document.createElement('div');
    wrapper.className = 'glass-card-wrapper';
    const el = document.createElement('div');
    el.className = 'final-card';
    el.innerHTML = `
      <div class="final-content">
        <div class="final-icon">✦</div>
        <div class="final-title">All Steps Completed</div>
        <div class="final-sub">Your USDT withdrawal to WinPay is in motion.<br>Top-up of <strong style="color:#ffffff">${vals.topUpINR.toLocaleString()} RP</strong> should be confirmed shortly.</div>
      </div>
      <div class="final-footer">
        <button class="btn-reset" onclick="resetAll()">↺ Start Over</button>
      </div>
    `;
    wrapper.appendChild(el);
    document.getElementById('results').appendChild(wrapper);
    setTimeout(() => {
      el.classList.add('shown');
      wrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 80);
  }

  function resetAll() {
    usdt = 0; rate = 0; vals = {};

    // Clear results
    document.getElementById('results').innerHTML = '';

    // Clear inputs
    document.getElementById('usdtInput').value = '';
    document.getElementById('rateInput').value = '';

    // Reset field 1
    const f1 = document.getElementById('field1');
    f1.classList.remove('visible', 'shown');
    f1.style.removeProperty('display'); // clear inline style so CSS default (display:none) takes over
    document.getElementById('field1Confirmed').style.display = 'none';

    // Reset field 2
    const f2 = document.getElementById('field2');
    f2.classList.remove('visible', 'shown');
    f2.style.removeProperty('display');
    document.getElementById('field2Confirmed').style.display = 'none';

    // Reset dividers
    document.getElementById('div1').classList.remove('shown');
    document.getElementById('div2').classList.remove('shown');

    // Reset calc button
    const cb = document.getElementById('calcBtn');
    cb.style.removeProperty('display');
    cb.classList.remove('shown');

    window.scrollTo({ top: 0, behavior: 'smooth' });

    // Re-show field 1 after a frame so CSS resets properly
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        showField('field1');
        setTimeout(() => document.getElementById('usdtInput').focus(), 400);
      });
    });
  }

  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const f1 = document.getElementById('field1');
    const f2 = document.getElementById('field2');
    if (f1.classList.contains('shown') && f1.classList.contains('visible')) { confirmField1(); }
    else if (f2.classList.contains('shown') && f2.classList.contains('visible')) { confirmField2(); }
  });
</script>
</body>
</html>
